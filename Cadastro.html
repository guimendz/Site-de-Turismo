<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="Assets/css/style.css">
</head>
<body class="cadastro-login">

    <main class="container">
        <section class="lado-esquerdo">
            <div class="logo">
                <img class="logo-tipo" src="" alt="Logo">
            </div>
            
            <h2>Bem vindo de volta</h2>
            <p>Acesse sua conta agora mesmo</p>
            <a class="botao" href="Login.html">Entrar</a>
        </section>

        <section class="lado-direito">
            <h2>Crie sua conta</h2>
            
            <form class="form-cadastro">
                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Nome</label>
                    <input id="nome" name="nome" type="text" placeholder="Nome" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="Email" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="senha">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="Senha" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="cpf">CPF</label>
                    <input id="cpf" name="cpf" type="text" placeholder="CPF" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nascimento">Data de Nascimento</label>
                    <input id="nascimento" name="nascimento" type="date" placeholder="Data de Nascimento" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="telefone">Telefone</label>
                    <input id="telefone" name="telefone" type="tel" placeholder="Telefone" required>
                </div>

                 <div class="campo-form">
                    <label class="rotulo-form" for="endereco">Endereço</label>
                    <input id="endereco" name="endereco" type="text" placeholder="Endereço" required>
                </div>

                <button class="botao" type="submit">Cadastrar</button>
            </form>
        </section>
    </main>

</body>
</html>
