<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="Assets/css/style.css">
</head>
<body class="cadastro-login">

    <main class="container">
        <section class="lado-esquerdo">
            <div class="logo">
                <img class="logo-tipo" src="" alt="Logo">
            </div>
            
            <h2>Bem vindo de volta</h2>
            <p>Acesse sua conta agora mesmo</p>
                <a href="Login.html"><button class="botao">Entrar</button></a>
        </section>

        <section class="lado-direito">
            <h2>Crie sua conta</h2>
            
            <form class="form-cadastro">
                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Nome</label>
                    <input id="nome" type="text" placeholder="Nome" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Email</label>
                    <input id="email" type="email" placeholder="Email" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Senha</label>
                    <input id="senha" type="password" placeholder="Senha" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">CPF</label>
                    <input id="nome" type="text" placeholder="CPF" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Data de Nascimento</label>
                    <input id="email" type="email" placeholder="Data de Nascimento" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Telefone</label>
                    <input id="senha" type="password" placeholder="Telefone" required>
                </div>

                 <div class="campo-form">
                    <label class="rotulo-form" for="nome">Endereço</label>
                    <input id="senha" type="password" placeholder="Endereço" required>
                </div>

                <button type="submit" class="botao">Cadastrar</button>
            </form>
        </section>
    </main>

</body>
</html>
