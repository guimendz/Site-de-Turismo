<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/css/style.css">
    <title>Login</title>
</head>
<body class="cadastro-login">

    <main class="container">
        <section class="lado-esquerdo">
            <div class="logo">
                <img class="logo-tipo" src="" alt="Logo">
            </div>

            <h2>Novo por aqui?</h2>
            <p>Crie sua conta agora mesmo</p>
            <a class="botao" href="Cadastro.html">Cadastrar</a>
        </section>

        <section class="lado-direito">
            <h2>Acessa sua conta</h2>

            <form class="form-cadastro">
                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Email</label>
                    <input id="email" name="email" type="email" placeholder="Email" required>
                </div>

                <div class="campo-form">
                    <label class="rotulo-form" for="nome">Senha</label>
                    <input id="senha" name="senha" type="password" placeholder="Senha" required>
                </div>

                <a id="esqueci-senha" href="#">Esqueci a senha?</a>
                
                <button class="botao" type="submit">Entrar</button>
            </form>
            
        </section>
    </main>

</body>
</html>
