<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Assets/css/style.css">
    <title>Alteração de dados</title>
</head>

<body id="pagina-dados">

<main class="container-dados">

    <aside class="sidebar-dados-pessoais">

        <div><img class="logo-tela-dados" src="" alt="Logo"></div>

        <nav class="sidebar-dados">
            <a href="#" class="voltar">&lt; Voltar</a>
            <a id="tela-atual" href="dados-usuario.html">Dados Pessoais</a>
            <a href="historico-pacotes.html">Histórico</a>
            <a href="#">Sair</a>
        </nav>
    </aside>

    <section class="dados-pessoais">
            <h1>Dados Pessoais</h1>
            <p>Realize a alteração de seus dados</p>

        <form class="form-dados">
            <div class="campo-dados">
                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text">
            </div>

            <div class="campo-dados">
                <label for="email">Email</label>
                <input id="email" name="email" type="email">
            </div>

            <div class="campo-dados">
                <label for="senha">Senha</label>
                <input id="senha" name="senha" type="password">
            </div>

            <div class="campo-dados">
                <label for="cpf">CPF</label>
                <input id="cpf" name="cpf" type="text">
            </div>

            <div class="campo-dados">
                <label for="nascimento">Data de Nascimento</label>
                <input id="nascimento" name="nascimento" type="date">
            </div>

            <div class="campo-dados">
                <label for="telefone">Telefone</label>
                <input id="telefone" name="telefone" type="tel">
            </div>

            <div id="campo-full-width" class="campo-dados">
                <label for="endereco">Endereço</label>
                <input id="endereco" name="endereco" type="text">
            </div>

            <div class="botoes-dados">
                <button class="botao-tipo2" id="botao-alterar" type="button">Salvar alterações</button>
            </div>
        </form>
    </section>
</main>

</body>
</html>
